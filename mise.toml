[tools]
bun = "latest"
hk = { version = "latest", postinstall = "hk install --mise" }
rumdl = "latest"

[env]
HK_MISE = 1

[settings]
lockfile = true
experimental = true

[tasks.drawio2webp]
description = "Render drawio/**/*.drawio to images/**/*.webp (draw.io CLI + cwebp)"
run = "./scripts/convert.sh"
