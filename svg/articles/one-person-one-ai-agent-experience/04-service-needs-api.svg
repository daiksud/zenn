<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"><defs><linearGradient id="g-page" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F3F6FB"/></linearGradient><linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF6FF"/><stop offset="1" stop-color="#DBEAFE"/></linearGradient><linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F6F4FF"/><stop offset="1" stop-color="#EDE9FE"/></linearGradient><linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFBEB"/><stop offset="1" stop-color="#FEF1C9"/></linearGradient><linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECFDF5"/><stop offset="1" stop-color="#CCFBEF"/></linearGradient><linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF1F2"/><stop offset="1" stop-color="#FFE0E4"/></linearGradient><linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#EAEFF6"/></linearGradient><marker id="arr-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#3B82F6"/></marker><marker id="arr-violet" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#8B5CF6"/></marker><marker id="arr-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F59E0B"/></marker><marker id="arr-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#10B981"/></marker><marker id="arr-rose" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F43F5E"/></marker><marker id="arr-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#64748B"/></marker><marker id="arr-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#94A3B8"/></marker><filter id="sh" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.13"/></filter><filter id="sh2" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/></filter></defs><rect x="10" y="10" width="880" height="740" rx="30" fill="url(#g-page)" stroke="#E2E8F0" stroke-width="1.5"/><text x="450.0" y="60" font-size="27" fill="#0F172A" font-weight="800" text-anchor="middle">🔌　エージェント時代に、サービスが用意すべきもの</text><text x="450.0" y="90.24000000000001" font-size="18" fill="#475569" font-weight="500" text-anchor="middle">対人間のコンシェルジュではなく、AIが“使える・分かる”入口を</text><rect x="48" y="356" width="208" height="150" rx="20" fill="url(#g-violet)" stroke="#7C3AED" stroke-width="2" filter="url(#sh)"/><text x="152" y="414" font-size="50" text-anchor="middle">🤖</text><text x="152" y="458" font-size="19" fill="#5B21B6" font-weight="700" text-anchor="middle"><tspan x="152" dy="0">ユーザーの</tspan><tspan x="152" dy="24">AIエージェント</tspan></text><rect x="296" y="152" width="560" height="560" rx="22" fill="url(#g-slate)" stroke="#94A3B8" stroke-width="2" filter="url(#sh)"/><text x="338" y="200" font-size="32" text-anchor="middle">🏢</text><text x="378" y="194" font-size="24" fill="#0F172A" font-weight="800" text-anchor="start">サービス</text><text x="378" y="222" font-size="16.5" fill="#64748B" font-weight="500" text-anchor="start">AIエージェントを“顧客”として迎える</text><rect x="324" y="244" width="504" height="64" rx="12" fill="#FFF1F2" stroke="#FFE0E4" stroke-width="1.5" filter="url(#sh2)"/><text x="354" y="284" font-size="27" text-anchor="start">🚫</text><text x="390" y="277" font-size="20" fill="#9F1239" font-weight="700" text-anchor="start" text-decoration="line-through">対“人間”のAIコンシェルジュ</text><text x="390" y="299" font-size="16" fill="#64748B" font-weight="500" text-anchor="start">AIエージェント相手では効果が薄い</text><rect x="324" y="324" width="504" height="78" rx="14" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="356" y="373.0" font-size="27" text-anchor="start">✅</text><text x="392" y="371.0" font-size="20" fill="#065F46" font-weight="700" text-anchor="start">エージェントが使える API</text><rect x="324" y="416" width="504" height="78" rx="14" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="356" y="465.0" font-size="27" text-anchor="start">✅</text><text x="392" y="463.0" font-size="20" fill="#065F46" font-weight="700" text-anchor="start">AI が理解できる API ドキュメント</text><rect x="324" y="508" width="504" height="78" rx="14" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="356" y="557.0" font-size="27" text-anchor="start">✅</text><text x="392" y="555.0" font-size="20" fill="#065F46" font-weight="700" text-anchor="start">MCP サーバー</text><rect x="324" y="600" width="504" height="78" rx="14" fill="#FFFFFF" stroke="#FEF1C9" stroke-width="1.5" filter="url(#sh2)"/><text x="356" y="649.0" font-size="27" text-anchor="start">✅</text><text x="392" y="634" font-size="20" fill="#92400E" font-weight="700" text-anchor="start">対エージェントの AIコンシェルジュ</text><text x="392" y="660" font-size="15.5" fill="#64748B" font-weight="600" text-anchor="start">📚 サービスのコンテキストを提供する</text><line x1="256" y1="404" x2="292" y2="363.0" stroke="#8B5CF6" stroke-width="3" marker-end="url(#arr-violet)" stroke-linecap="round"/><text x="274.0" y="372" font-size="16" fill="#475569" font-weight="700" text-anchor="middle"><tspan x="274.0" dy="0">API / MCP</tspan><tspan x="274.0" dy="20">でアクセス</tspan></text><path d="M292,639.0 C250,600 210,500 256,452" fill="none" stroke="#F59E0B" stroke-width="2.4" stroke-dasharray="2 7" stroke-linecap="round" marker-end="url(#arr-amber)"/><text x="150" y="568" font-size="16" fill="#92400E" font-weight="700" text-anchor="middle"><tspan x="150" dy="0">知り得ない</tspan><tspan x="150" dy="20">情報を補完</tspan></text></svg>