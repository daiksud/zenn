<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="700" viewBox="0 0 1220 700" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"><defs><linearGradient id="g-page" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F3F6FB"/></linearGradient><linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF6FF"/><stop offset="1" stop-color="#DBEAFE"/></linearGradient><linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F6F4FF"/><stop offset="1" stop-color="#EDE9FE"/></linearGradient><linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFBEB"/><stop offset="1" stop-color="#FEF1C9"/></linearGradient><linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECFDF5"/><stop offset="1" stop-color="#CCFBEF"/></linearGradient><linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF1F2"/><stop offset="1" stop-color="#FFE0E4"/></linearGradient><linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#EAEFF6"/></linearGradient><marker id="arr-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#3B82F6"/></marker><marker id="arr-violet" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#8B5CF6"/></marker><marker id="arr-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F59E0B"/></marker><marker id="arr-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#10B981"/></marker><marker id="arr-rose" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F43F5E"/></marker><marker id="arr-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#64748B"/></marker><marker id="arr-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#94A3B8"/></marker><filter id="sh" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.13"/></filter><filter id="sh2" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/></filter></defs><rect x="10" y="10" width="1200" height="680" rx="30" fill="url(#g-page)" stroke="#E2E8F0" stroke-width="1.5"/><text x="610.0" y="72" font-size="37" fill="#0F172A" font-weight="800" text-anchor="middle">🔌　エージェント時代に、サービスが用意すべきもの</text><text x="610.0" y="110" font-size="20.5" fill="#475569" font-weight="500" text-anchor="middle">対人間のコンシェルジュではなく、AIが“使える・分かる”入口を</text><rect x="70" y="294" width="214" height="132" rx="20" fill="url(#g-violet)" stroke="#7C3AED" stroke-width="2" filter="url(#sh)"/><text x="177" y="348" font-size="46" text-anchor="middle">🤖</text><text x="177" y="390" font-size="17.5" fill="#5B21B6" font-weight="700" text-anchor="middle"><tspan x="177" dy="0">ユーザーの</tspan><tspan x="177" dy="22">AIエージェント</tspan></text><rect x="360" y="150" width="790" height="460" rx="22" fill="url(#g-slate)" stroke="#94A3B8" stroke-width="2" filter="url(#sh)"/><text x="404" y="196" font-size="30" text-anchor="middle">🏢</text><text x="436" y="190" font-size="23" fill="#0F172A" font-weight="800" text-anchor="start">サービス</text><text x="436" y="216" font-size="15.5" fill="#64748B" font-weight="500" text-anchor="start">AIエージェントを“顧客”として迎える</text><rect x="390" y="238" width="730" height="58" rx="12" fill="#FFF1F2" stroke="#FFE0E4" stroke-width="1.5" filter="url(#sh2)"/><text x="420" y="274" font-size="25" text-anchor="start">🚫</text><text x="450" y="274" font-size="18.5" fill="#9F1239" font-weight="600" text-anchor="start" text-decoration="line-through">対“人間”のAIコンシェルジュ</text><text x="1096" y="274" font-size="16" fill="#64748B" font-weight="500" text-anchor="end">エージェント相手では効果が薄い</text><rect x="390" y="320" width="353.0" height="108" rx="14" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="420" y="383.0" font-size="25" text-anchor="start">✅</text><text x="452" y="380.0" font-size="18" fill="#065F46" font-weight="700" text-anchor="start"><tspan x="452" dy="0">エージェントが使えるAPI</tspan></text><rect x="767.0" y="320" width="353.0" height="108" rx="14" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="797.0" y="383.0" font-size="25" text-anchor="start">✅</text><text x="829.0" y="367.0" font-size="17.5" fill="#065F46" font-weight="700" text-anchor="start"><tspan x="829.0" dy="0">AIが理解できる使い方</tspan><tspan x="829.0" dy="26">（API ドキュメント）</tspan></text><rect x="390" y="446" width="353.0" height="108" rx="14" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="420" y="509.0" font-size="25" text-anchor="start">✅</text><text x="452" y="506.0" font-size="18" fill="#065F46" font-weight="700" text-anchor="start"><tspan x="452" dy="0">MCP サーバー</tspan></text><rect x="767.0" y="446" width="353.0" height="108" rx="14" fill="#FFFFFF" stroke="#FEF1C9" stroke-width="1.5" filter="url(#sh2)"/><text x="797.0" y="509.0" font-size="25" text-anchor="start">✅</text><text x="829.0" y="479.0" font-size="17.5" fill="#92400E" font-weight="700" text-anchor="start"><tspan x="829.0" dy="0">対エージェントの</tspan><tspan x="829.0" dy="26">AIコンシェルジュ</tspan></text><text x="829.0" y="532.0" font-size="14.5" fill="#64748B" font-weight="600" text-anchor="start">📚 サービスのコンテキストを提供</text><line x1="284" y1="354" x2="354" y2="374.0" stroke="#8B5CF6" stroke-width="3" marker-end="url(#arr-violet)" stroke-linecap="round"/><text x="322.0" y="322" font-size="15.5" fill="#475569" font-weight="700" text-anchor="middle"><tspan x="322.0" dy="0">API / MCP</tspan><tspan x="322.0" dy="20">経由でアクセス</tspan></text><path d="M354,500.0 C300,560 250,470 286,392" fill="none" stroke="#F59E0B" stroke-width="2.4" stroke-dasharray="2 7" stroke-linecap="round" marker-end="url(#arr-amber)"/><text x="232" y="556" font-size="15" fill="#92400E" font-weight="700" text-anchor="middle">知り得ない情報を補完</text></svg>