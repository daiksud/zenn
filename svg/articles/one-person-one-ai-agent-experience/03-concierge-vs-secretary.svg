<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1086" viewBox="0 0 700 1086" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"><defs><linearGradient id="g-page" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F3F6FB"/></linearGradient><linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF6FF"/><stop offset="1" stop-color="#DBEAFE"/></linearGradient><linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F6F4FF"/><stop offset="1" stop-color="#EDE9FE"/></linearGradient><linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFBEB"/><stop offset="1" stop-color="#FEF1C9"/></linearGradient><linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECFDF5"/><stop offset="1" stop-color="#CCFBEF"/></linearGradient><linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF1F2"/><stop offset="1" stop-color="#FFE0E4"/></linearGradient><linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#EAEFF6"/></linearGradient><marker id="arr-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#3B82F6"/></marker><marker id="arr-violet" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#8B5CF6"/></marker><marker id="arr-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F59E0B"/></marker><marker id="arr-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#10B981"/></marker><marker id="arr-rose" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F43F5E"/></marker><marker id="arr-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#64748B"/></marker><marker id="arr-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#94A3B8"/></marker><filter id="sh" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.13"/></filter><filter id="sh2" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/></filter></defs><rect x="10" y="10" width="680" height="1066" rx="30" fill="url(#g-page)" stroke="#E2E8F0" stroke-width="1.5"/><text x="350.0" y="46" font-size="21" fill="#0F172A" font-weight="800" text-anchor="middle">🆚　「コンシェルジュ」と「専属秘書」は何が違うのか</text><text x="350.0" y="69.52000000000001" font-size="14" fill="#475569" font-weight="500" text-anchor="middle">知っている“コンテキスト”が、応対の質を分ける</text><rect x="50" y="100" width="600" height="56" rx="16" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#sh2)"/><text x="80" y="137" font-size="26" text-anchor="start">🧑</text><text x="366.0" y="135" font-size="15" fill="#1E3A8A" font-weight="700" text-anchor="middle">ユーザー：「沖縄に行きたいからホテルと飛行機を予約して」</text><line x1="350.0" y1="160" x2="350.0" y2="182" stroke="#94A3B8" stroke-width="2.4" marker-end="url(#arr-gray)" stroke-linecap="round"/><rect x="40" y="196" width="620" height="380" rx="20" fill="url(#g-amber)" stroke="#D97706" stroke-width="2" filter="url(#sh)"/><text x="82" y="240" font-size="30" text-anchor="middle">🛎️</text><text x="118" y="238" font-size="20" fill="#92400E" font-weight="800" text-anchor="start">AIコンシェルジュ</text><text x="118" y="262" font-size="13.5" fill="#64748B" font-weight="500" text-anchor="start">サービス側に常駐している</text><rect x="66" y="282" width="568" height="50" rx="12" fill="#FFFFFFEE" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="96" y="315.32" font-size="26" text-anchor="middle">✅</text><text x="124" y="312.44" font-size="16" fill="#065F46" font-weight="600" text-anchor="start">知っている：サービスのコンテキスト</text><rect x="66" y="344" width="568" height="50" rx="12" fill="#FFFFFFEE" stroke="#FFE0E4" stroke-width="1.5" filter="url(#sh2)"/><text x="96" y="377.32" font-size="26" text-anchor="middle">🚫</text><text x="124" y="374.44" font-size="16" fill="#9F1239" font-weight="600" text-anchor="start">知らない：あなた個人のコンテキスト</text><rect x="66" y="408" width="568" height="148" rx="12" fill="#FFFFFFEE" stroke="#FEF1C9" stroke-width="1.5" filter="url(#sh2)"/><text x="92" y="446" font-size="26" text-anchor="start">🤔</text><text x="124" y="444" font-size="18" fill="#92400E" font-weight="700" text-anchor="start">無難な質問しかできない</text><text x="100" y="482" font-size="15" fill="#475569" font-weight="500" text-anchor="start"><tspan x="100" dy="0">・「行き先は本島？ 石垣島？」</tspan><tspan x="100" dy="29">・「どんなホテルがお好みで？」</tspan><tspan x="100" dy="29">・「航空会社は JAL？ ANA？」</tspan></text><text x="350.0" y="600" font-size="28" text-anchor="middle">🆚</text><rect x="40" y="616" width="620" height="380" rx="20" fill="url(#g-violet)" stroke="#7C3AED" stroke-width="2" filter="url(#sh)"/><text x="82" y="660" font-size="30" text-anchor="middle">🤝</text><text x="118" y="658" font-size="20" fill="#5B21B6" font-weight="800" text-anchor="start">専属の秘書（あなたのAI）</text><text x="118" y="682" font-size="13.5" fill="#64748B" font-weight="500" text-anchor="start">あなた側に常駐している</text><rect x="66" y="702" width="568" height="50" rx="12" fill="#FFFFFFEE" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="96" y="735.32" font-size="26" text-anchor="middle">✅</text><text x="124" y="732.44" font-size="16" fill="#065F46" font-weight="600" text-anchor="start">知っている：あなた個人のコンテキスト</text><rect x="66" y="764" width="568" height="50" rx="12" fill="#FFFFFFEE" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="96" y="797.32" font-size="26" text-anchor="middle">✅</text><text x="124" y="794.44" font-size="16" fill="#065F46" font-weight="600" text-anchor="start">過去の旅行や好みもすべて把握している</text><rect x="66" y="828" width="568" height="148" rx="12" fill="#FFFFFFEE" stroke="#EDE9FE" stroke-width="1.5" filter="url(#sh2)"/><text x="92" y="866" font-size="26" text-anchor="start">💡</text><text x="124" y="864" font-size="18" fill="#5B21B6" font-weight="700" text-anchor="start">先回りして提案できる</text><text x="100" y="902" font-size="15" fill="#475569" font-weight="500" text-anchor="start"><tspan x="100" dy="0">・「本島と石垣は訪問済みなので宮古島は？」</tspan><tspan x="100" dy="29">・「いつもの星野リゾート系列で？」</tspan><tspan x="100" dy="29">・「いつもの JAL ファーストクラスで？」</tspan></text><text x="350.0" y="1058" font-size="15" fill="#475569" font-weight="600" text-anchor="middle">同じ依頼でも、“知っているコンテキスト”の差で応対の質はこれだけ変わる</text></svg>