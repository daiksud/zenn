.0" y="304" font-size="16" fill="#065F46" font-weight="700" text-anchor="middle"><tspan x="170.0" dy="0">✅ ホテル予約はできる</tspan></text><rect x="44" y="362" width="252" height="210" rx="14" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5" filter="url(#sh2)"/><text x="170.0" y="394" font-size="15" fill="#475569" font-weight="600" text-anchor="middle"><tspan x="170.0" dy="0">🚫 航空券予約</tspan><tspan x="170.0" dy="40">🚫 レンタカー予約</tspan><tspan x="170.0" dy="40">🚫 アクティビティ予約</tspan><tspan x="170.0" dy="40">（他サービスは扱えない）</tspan></text><rect x="384" y="108" width="292" height="574" rx="20" fill="url(#g-teal)" stroke="#0D9488" stroke-width="2.2" filter="url(#sh)"/><rect x="423.0" y="130.0" width="214" height="40" rx="20.0" fill="#0D9488" filter="url(#sh2)"/><text x="530.0" y="155.76" font-size="16" fill="#FFFFFF" font-weight="800" text-anchor="middle">🤖 個人のAIエージェント</text><rect x="404" y="188" width="252" height="72" rx="12" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="530.0" y="217" font-size="15" fill="#065F46" font-weight="700" text-anchor="middle"><tspan x="530.0" dy="0">目的は「沖縄旅行を完了する」</tspan><tspan x="530.0" dy="22">こと</tspan></text><rect x="456.0" y="324" width="148" height="64" rx="32" fill="#ECFEFF" stroke="#0D9488" stroke-width="1.8" filter="url(#sh2)"/><text x="530.0" y="353" font-size="16" fill="#065F46" font-weight="800" text-anchor="middle"><tspan x="530.0" dy="0">🏝️ 沖縄旅行</tspan></text><rect x="440" y="448" width="96" height="64" rx="12" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="464" y="491" font-size="22" text-anchor="middle">🏨</text><text x="498" y="490" font-size="14" fill="#065F46" font-weight="700" text-anchor="middle">ホテル</text><path d="M530.0,388 C530.0,440 488,432 488,448" fill="none" stroke="#10B981" stroke-width="2.2" stroke-dasharray="2 6" stroke-linecap="round" marker-end="url(#arr-teal)"/><rect x="552" y="448" width="96" height="64" rx="12" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="