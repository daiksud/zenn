<svg xmlns="http://www.w3.org/2000/svg" width="700" height="760" viewBox="0 0 700 760" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"><defs><linearGradient id="g-page" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F3F6FB"/></linearGradient><linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF6FF"/><stop offset="1" stop-color="#DBEAFE"/></linearGradient><linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F6F4FF"/><stop offset="1" stop-color="#EDE9FE"/></linearGradient><linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFBEB"/><stop offset="1" stop-color="#FEF1C9"/></linearGradient><linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECFDF5"/><stop offset="1" stop-color="#CCFBEF"/></linearGradient><linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF1F2"/><stop offset="1" stop-color="#FFE0E4"/></linearGradient><linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#EAEFF6"/></linearGradient><marker id="arr-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#3B82F6"/></marker><marker id="arr-violet" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#8B5CF6"/></marker><marker id="arr-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F59E0B"/></marker><marker id="arr-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#10B981"/></marker><marker id="arr-rose" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F43F5E"/></marker><marker id="arr-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#64748B"/></marker><marker id="arr-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#94A3B8"/></marker><filter id="sh" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.13"/></filter><filter id="sh2" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/></filter></defs><rect x="10" y="10" width="680" height="740" rx="30" fill="url(#g-page)" stroke="#E2E8F0" stroke-width="1.5"/><text x="350.0" y="48" font-size="22" fill="#0F172A" font-weight="800" text-anchor="middle">🧭　AIコンシェルジュとAIエージェントの「連携範囲」の差</text><text x="350.0" y="72.64" font-size="14" fill="#475569" font-weight="500" text-anchor="middle">サービス内に閉じるか、目的単位で横断できるか</text><rect x="24" y="108" width="312" height="608" rx="20" fill="url(#g-amber)" stroke="#D97706" stroke-width="2" filter="url(#sh)"/><rect x="77.0" y="130.0" width="206" height="40" rx="20.0" fill="#D97706" filter="url(#sh2)"/><text x="180.0" y="155.76" font-size="16" fill="#FFFFFF" font-weight="800" text-anchor="middle">🛎️ AIコンシェルジュ</text><rect x="44" y="188" width="272" height="66" rx="12" fill="#FFFFFF" stroke="#FEF1C9" stroke-width="1.5" filter="url(#sh2)"/><text x="180.0" y="228" font-size="15" fill="#92400E" font-weight="700" text-anchor="middle">ホテル予約サービス内で動作</text><rect x="44" y="270" width="272" height="62" rx="12" fill="#ECFDF5" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="180.0" y="308" font-size="16" fill="#065F46" font-weight="700" text-anchor="middle">✅ ホテル予約はできる</text><rect x="44" y="350" width="272" height="62" rx="12" fill="#FFF7ED" stroke="#D97706" stroke-width="1.3" filter="url(#sh2)"/><text x="72" y="390" font-size="20" text-anchor="middle">🚫</text><text x="108" y="389" font-size="15" fill="#475569" font-weight="600" text-anchor="start">航空券予約は不可</text><rect x="44" y="424" width="272" height="62" rx="12" fill="#FFF7ED" stroke="#D97706" stroke-width="1.3" filter="url(#sh2)"/><text x="72" y="464" font-size="20" text-anchor="middle">🚫</text><text x="108" y="463" font-size="15" fill="#475569" font-weight="600" text-anchor="start">レンタカー予約は不可</text><rect x="44" y="498" width="272" height="62" rx="12" fill="#FFF7ED" stroke="#D97706" stroke-width="1.3" filter="url(#sh2)"/><text x="72" y="538" font-size="20" text-anchor="middle">🚫</text><text x="108" y="537" font-size="15" fill="#475569" font-weight="600" text-anchor="start">アクティビティ予約は不可</text><rect x="44" y="572" width="272" height="62" rx="12" fill="#FFF7ED" stroke="#D97706" stroke-width="1.3" filter="url(#sh2)"/><text x="72" y="612" font-size="20" text-anchor="middle">🚫</text><text x="108" y="611" font-size="15" fill="#475569" font-weight="600" text-anchor="start">他サービスの情報参照は不可</text><rect x="44" y="654" width="272" height="54" rx="14" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5" filter="url(#sh2)"/><text x="180.0" y="676" font-size="14" fill="#92400E" font-weight="700" text-anchor="middle"><tspan x="180.0" dy="0">依頼は丁寧に処理できるが、</tspan><tspan x="180.0" dy="20">サービスの外へは出られない</tspan></text><rect x="364" y="108" width="312" height="608" rx="20" fill="url(#g-teal)" stroke="#0D9488" stroke-width="2.2" filter="url(#sh)"/><rect x="408.0" y="130.0" width="224" height="40" rx="20.0" fill="#0D9488" filter="url(#sh2)"/><text x="520.0" y="155.76" font-size="16" fill="#FFFFFF" font-weight="800" text-anchor="middle">🤖 個人のAIエージェント</text><rect x="384" y="188" width="272" height="66" rx="12" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="520.0" y="228" font-size="15" fill="#065F46" font-weight="700" text-anchor="middle">目的起点でタスクを束ねる</text><rect x="434.0" y="302" width="172" height="60" rx="30" fill="#ECFEFF" stroke="#0D9488" stroke-width="1.8" filter="url(#sh2)"/><text x="520.0" y="340" font-size="15" fill="#065F46" font-weight="800" text-anchor="middle">🏝️ 目的：沖縄旅行を成立</text><rect x="394" y="410" width="132" height="62" rx="12" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="417" y="450" font-size="20" text-anchor="middle">🏨</text><text x="436" y="449" font-size="13" fill="#065F46" font-weight="700" text-anchor="start">ホテル予約</text><path d="M520.0,362 C520.0,414 449,396 449,410" fill="none" stroke="#10B981" stroke-width="2.2" stroke-dasharray="2 6" stroke-linecap="round" marker-end="url(#arr-teal)"/><rect x="536" y="410" width="132" height="62" rx="12" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="559" y="450" font-size="20" text-anchor="middle">✈️</text><text x="578" y="449" font-size="13" fill="#065F46" font-weight="700" text-anchor="start">航空券予約</text><path d="M520.0,362 C520.0,414 591,396 591,410" fill="none" stroke="#10B981" stroke-width="2.2" stroke-dasharray="2 6" stroke-linecap="round" marker-end="url(#arr-teal)"/><rect x="394" y="486" width="132" height="62" rx="12" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="417" y="526" font-size="20" text-anchor="middle">🚗</text><text x="436" y="525" font-size="13" fill="#065F46" font-weight="700" text-anchor="start">レンタカー</text><path d="M520.0,362 C520.0,414 449,472 449,486" fill="none" stroke="#10B981" stroke-width="2.2" stroke-dasharray="2 6" stroke-linecap="round" marker-end="url(#arr-teal)"/><rect x="536" y="486" width="132" height="62" rx="12" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="559" y="526" font-size="20" text-anchor="middle">🤿</text><text x="578" y="525" font-size="13" fill="#065F46" font-weight="700" text-anchor="start">アクティビティ</text><path d="M520.0,362 C520.0,414 591,472 591,486" fill="none" stroke="#10B981" stroke-width="2.2" stroke-dasharray="2 6" stroke-linecap="round" marker-end="url(#arr-teal)"/><rect x="465" y="562" width="132" height="62" rx="12" fill="#FFFFFF" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="488" y="602" font-size="20" text-anchor="middle">🗺️</text><text x="507" y="601" font-size="13" fill="#065F46" font-weight="700" text-anchor="start">現地ナビ</text><path d="M520.0,362 C520.0,414 520,548 520,562" fill="none" stroke="#10B981" stroke-width="2.2" stroke-dasharray="2 6" stroke-linecap="round" marker-end="url(#arr-teal)"/><rect x="384" y="654" width="272" height="54" rx="14" fill="#ECFEFF" stroke="#0D9488" stroke-width="1.5" filter="url(#sh2)"/><text x="520.0" y="676" font-size="14" fill="#065F46" font-weight="700" text-anchor="middle"><tspan x="520.0" dy="0">旅程作成から現地ナビまで、</tspan><tspan x="520.0" dy="20">横断的に一気通貫で実行できる</tspan></text></svg>