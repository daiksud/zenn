<svg xmlns="http://www.w3.org/2000/svg" width="860" height="1180" viewBox="0 0 860 1180" font-family="'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic',sans-serif"><defs><linearGradient id="g-page" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#F3F6FB"/></linearGradient><linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#EFF6FF"/><stop offset="1" stop-color="#DBEAFE"/></linearGradient><linearGradient id="g-violet" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F6F4FF"/><stop offset="1" stop-color="#EDE9FE"/></linearGradient><linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFFBEB"/><stop offset="1" stop-color="#FEF1C9"/></linearGradient><linearGradient id="g-teal" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ECFDF5"/><stop offset="1" stop-color="#CCFBEF"/></linearGradient><linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFF1F2"/><stop offset="1" stop-color="#FFE0E4"/></linearGradient><linearGradient id="g-slate" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#EAEFF6"/></linearGradient><marker id="arr-blue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#3B82F6"/></marker><marker id="arr-violet" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#8B5CF6"/></marker><marker id="arr-amber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F59E0B"/></marker><marker id="arr-teal" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#10B981"/></marker><marker id="arr-rose" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F43F5E"/></marker><marker id="arr-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#64748B"/></marker><marker id="arr-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#94A3B8"/></marker><filter id="sh" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.13"/></filter><filter id="sh2" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/></filter></defs><rect x="10" y="10" width="840" height="1160" rx="30" fill="url(#g-page)" stroke="#E2E8F0" stroke-width="1.5"/><text x="430.0" y="60" font-size="28" fill="#0F172A" font-weight="800" text-anchor="middle">🆚　「コンシェルジュ」と「専属秘書」は何が違うのか</text><text x="430.0" y="91.36" font-size="18" fill="#475569" font-weight="500" text-anchor="middle">知っている“コンテキスト”が、応対の質を分ける</text><rect x="112.0" y="124" width="636" height="64" rx="16" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#sh2)"/><text x="138.0" y="165" font-size="28" text-anchor="start">🧑</text><text x="446.0" y="165" font-size="19" fill="#1E3A8A" font-weight="700" text-anchor="middle">ユーザー：「沖縄に行きたいからホテルと飛行機を予約して」</text><line x1="430.0" y1="192" x2="430.0" y2="216" stroke="#94A3B8" stroke-width="2.6" marker-end="url(#arr-gray)" stroke-linecap="round"/><rect x="40" y="226" width="780" height="428" rx="20" fill="url(#g-amber)" stroke="#D97706" stroke-width="2" filter="url(#sh)"/><text x="84" y="278" font-size="36" text-anchor="middle">🛎️</text><text x="128" y="272" font-size="24" fill="#92400E" font-weight="800" text-anchor="start">AIコンシェルジュ</text><text x="128" y="300" font-size="17" fill="#64748B" font-weight="500" text-anchor="start">サービス側に常駐している</text><rect x="68" y="326" width="724" height="56" rx="12" fill="#FFFFFFEE" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="100" y="363.0" font-size="29" text-anchor="middle">✅</text><text x="132" y="360.8" font-size="20" fill="#065F46" font-weight="600" text-anchor="start">知っている：サービスのコンテキスト</text><rect x="68" y="396" width="724" height="56" rx="12" fill="#FFFFFFEE" stroke="#FFE0E4" stroke-width="1.5" filter="url(#sh2)"/><text x="100" y="433.0" font-size="29" text-anchor="middle">🚫</text><text x="132" y="430.8" font-size="20" fill="#9F1239" font-weight="600" text-anchor="start">知らない：あなた個人のコンテキスト</text><rect x="68" y="474" width="724" height="178" rx="12" fill="#FFFFFFEE" stroke="#FEF1C9" stroke-width="1.5" filter="url(#sh2)"/><text x="96" y="518" font-size="28" text-anchor="start">🤔</text><text x="132" y="516" font-size="20" fill="#92400E" font-weight="700" text-anchor="start">無難な質問しかできない</text><text x="106" y="560" font-size="19" fill="#475569" font-weight="500" text-anchor="start"><tspan x="106" dy="0">・「行き先は本島？ 石垣島？」</tspan><tspan x="106" dy="34">・「どんなホテルがお好みで？」</tspan><tspan x="106" dy="34">・「航空会社は JAL？ ANA？」</tspan></text><text x="430.0" y="678" font-size="30" text-anchor="middle">🆚</text><rect x="40" y="694" width="780" height="428" rx="20" fill="url(#g-violet)" stroke="#7C3AED" stroke-width="2" filter="url(#sh)"/><text x="84" y="746" font-size="36" text-anchor="middle">🤝</text><text x="128" y="740" font-size="24" fill="#5B21B6" font-weight="800" text-anchor="start">専属の秘書（あなたのAI）</text><text x="128" y="768" font-size="17" fill="#64748B" font-weight="500" text-anchor="start">あなた側に常駐している</text><rect x="68" y="794" width="724" height="56" rx="12" fill="#FFFFFFEE" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="100" y="831.0" font-size="29" text-anchor="middle">✅</text><text x="132" y="828.8" font-size="20" fill="#065F46" font-weight="600" text-anchor="start">知っている：あなた個人のコンテキスト</text><rect x="68" y="864" width="724" height="56" rx="12" fill="#FFFFFFEE" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="100" y="901.0" font-size="29" text-anchor="middle">✅</text><text x="132" y="898.8" font-size="20" fill="#065F46" font-weight="600" text-anchor="start">過去の旅行や好みもすべて把握している</text><rect x="68" y="942" width="724" height="178" rx="12" fill="#FFFFFFEE" stroke="#EDE9FE" stroke-width="1.5" filter="url(#sh2)"/><text x="96" y="986" font-size="28" text-anchor="start">💡</text><text x="132" y="984" font-size="20" fill="#5B21B6" font-weight="700" text-anchor="start">先回りして提案できる</text><text x="106" y="1028" font-size="19" fill="#475569" font-weight="500" text-anchor="start"><tspan x="106" dy="0">・「本島と石垣は訪問済みなので宮古島は？」</tspan><tspan x="106" dy="34">・「いつもの星野リゾート系列で？」</tspan><tspan x="106" dy="34">・「いつもの JAL ファーストクラスで？」</tspan></text><text x="430.0" y="1156" font-size="18.5" fill="#475569" font-weight="600" text-anchor="middle">同じ依頼でも、“知っているコンテキスト”の差で応対の質はこれだけ変わる</text></svg>