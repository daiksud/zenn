ose" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#F43F5E"/></marker><marker id="arr-slate" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#64748B"/></marker><marker id="arr-gray" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 L3,5 z" fill="#94A3B8"/></marker><filter id="sh" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.13"/></filter><filter id="sh2" x="-25%" y="-25%" width="150%" height="160%"><feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.10"/></filter></defs><rect x="10" y="10" width="1180" height="580" rx="30" fill="url(#g-page)" stroke="#E2E8F0" stroke-width="1.5"/><text x="600.0" y="72" font-size="37" fill="#0F172A" font-weight="800" text-anchor="middle">✨　UX から AX へ</text><text x="600.0" y="110" font-size="20.5" fill="#475569" font-weight="500" text-anchor="middle">これから重要になるのは「AIエージェント体験（AX）」</text><rect x="70" y="180" width="446" height="320" rx="22" fill="url(#g-slate)" stroke="#94A3B8" stroke-width="2" filter="url(#sh)"/><rect x="193.0" y="202.0" width="200" height="44" rx="22.0" fill="#64748B" filter="url(#sh2)"/><text x="293.0" y="231.2" font-size="20" fill="#FFFFFF" font-weight="800" text-anchor="middle">これまで</text><rect x="100" y="266" width="386" height="64" rx="12" fill="#FFFFFFEE" stroke="#FEF1C9" stroke-width="1.5" filter="url(#sh2)"/><text x="130" y="306.0" font-size="27" text-anchor="middle">🖥️</text><text x="158" y="292.0" font-size="18" fill="#92400E" font-weight="600" text-anchor="start"><tspan x="158" dy="0">各サービスが</tspan><tspan x="158" dy="24">AIコンシェルジュを用意</tspan></text><rect x="100" y="340" width="386" height="64" rx="12" fill="#FFFFFFEE" stroke="#DBEAFE" stroke-width="1.5" filter="url(#sh2)"/><text x="130" y="380.0" font-size="27" text-anchor="middle">🧑</text><text x="158" y="379.0" font-size="18" fill="#1E3A8A" font-weight="600" text-anchor="start">人間が自らサービスを使う</text><rect x="100" y="414" width="386" height="62" rx="14" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5" filter="url(#sh2)"/><text x="293.0" y="452" font-size="19.5" fill="#92400E" font-weight="800" text-anchor="middle">👀 UX（ユーザー体験）が競争力</text><text x="600.0" y="322.0" font-size="50" text-anchor="middle">➡️</text><rect x="516.0" y="355.0" width="168" height="38" rx="19.0" fill="#0D9488" filter="url(#sh2)"/><text x="600.0" y="379.94" font-size="16.5" fill="#FFFFFF" font-weight="800" text-anchor="middle">パラダイムシフト</text><rect x="684" y="180" width="446" height="320" rx="22" fill="url(#g-teal)" stroke="#0D9488" stroke-width="2.4" filter="url(#sh)"/><rect x="807.0" y="202.0" width="200" height="44" rx="22.0" fill="#0D9488" filter="url(#sh2)"/><text x="907.0" y="231.2" font-size="20" fill="#FFFFFF" font-weight="800" text-anchor="middle">これから</text><rect x="714" y="266" width="386" height="64" rx="12" fill="#FFFFFFEE" stroke="#CCFBEF" stroke-width="1.5" filter="url(#sh2)"/><text x="744" y="306.0" font-size="27" text-anchor="middle">🔌</text><text x="772" y="292.0" font-size="18" fill="#065F46" font-weight="600" text-anchor="start"><tspan x="772" dy="0">各サービスが</tspan><tspan x="772" dy="24">API / MCPサーバーを用意</tspan></text><rect x="714" y="340" width="386" height="64" rx="12" fill="#FFFFFFEE" stroke="#EDE9FE" stroke-width="1.5" filter="url(#sh2)"/><text x="744" y="380.0" font-size="27" text-anchor="middle">🤖</text><text x="772" y="366.0" font-size="18" fill="#5B21B6" font-weight="600" text-anchor="start"><tspan x="772" dy="0">人間は自分の</tspan><tspan x="772" dy="24">AIエージェントに依頼</tspan></text><rect x="714" y="414" width="386" height="62" rx="14" fill="#ECFEFF" stroke="#0D9488" stroke-width="1.8" filter="url(#sh2)"/><text x="907.0" y="452" font-size="18.5" fill="#065