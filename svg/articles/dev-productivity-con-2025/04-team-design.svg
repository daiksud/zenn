<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1110" viewBox="0 0 1400 1110" role="img" aria-label="組織とチーム設計（flowchart）">
  <defs>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="170%"><feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/></filter>
    <marker id="arr" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8.5" markerHeight="8.5" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 L3.6,6 Z" fill="#475569"/></marker>
    
  </defs>
  <style>.jp{font-family:"Inter","Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif}</style>
  <rect width="1400" height="1110" fill="#f6f8fc"/><circle cx="1290" cy="110" r="270" fill="#0891b2" opacity="0.08"/><circle cx="120" cy="990" r="300" fill="#059669" opacity="0.08"/><text class="jp" x="80" y="80" font-size="38" font-weight="900" letter-spacing="3" fill="#0891b2">DEV PRODUCTIVITY CON 2025</text>
    <text class="jp" x="78" y="142" font-size="58" font-weight="900" fill="#0f172a">組織とチーム設計（flowchart）</text>
    <text class="jp" x="80" y="202" font-size="40" font-weight="800" fill="#475569">巨大な単一チーム → 自律した小チーム＋共通基盤</text><rect x="76" y="262" width="468" height="484" rx="32" fill="#f1f5f9" stroke="#64748b" stroke-width="3" stroke-dasharray="2 10"/><g filter="url(#sh)"><rect x="125.44000000000003" y="238" width="369.11999999999995" height="58" rx="29" fill="#64748b"/></g><text class="jp" x="310" y="277" font-size="38" font-weight="900" fill="#fff" text-anchor="middle"><tspan x="310" dy="0">巨大な単一チーム</tspan></text><g filter="url(#sh)"><rect x="104" y="430" width="412" height="214" rx="28" fill="#ffffff" stroke="#94a3b8" stroke-width="3"/></g><text class="jp" x="310" y="502" font-size="40" font-weight="900" fill="#0f172a" text-anchor="middle"><tspan x="310" dy="0">🛋️ 1つのソファを</tspan></text><text class="jp" x="310" y="554" font-size="40" font-weight="900" fill="#0f172a" text-anchor="middle"><tspan x="310" dy="0">大人数で運ぶ</tspan></text><text class="jp" x="310" y="606" font-size="38" font-weight="750" fill="#475569" text-anchor="middle"><tspan x="310" dy="0">意思疎通できず混乱</tspan></text><path d="M560 504 L694 504" fill="none" stroke="#475569" stroke-width="9"  marker-end="url(#arr)"/><rect x="716" y="262" width="608" height="484" rx="32" fill="#ecfdf5" stroke="#059669" stroke-width="3" stroke-dasharray="2 10"/><g filter="url(#sh)"><rect x="737.59" y="238" width="564.8199999999999" height="58" rx="29" fill="#059669"/></g><text class="jp" x="1020" y="277" font-size="38" font-weight="900" fill="#fff" text-anchor="middle"><tspan x="1020" dy="0">自律した小チーム＋共通基盤</tspan></text><g filter="url(#sh)"><rect x="748" y="336" width="174" height="112" rx="24" fill="#ffffff" stroke="#0891b2" stroke-width="3"/></g><text class="jp" x="835" y="404" font-size="40" font-weight="900" fill="#0f172a" text-anchor="middle"><tspan x="835" dy="0">チームA</tspan></text><path d="M835 448 L1020 560" fill="none" stroke="#475569" stroke-width="3"  marker-end="url(#arr)"/><g filter="url(#sh)"><rect x="938" y="336" width="174" height="112" rx="24" fill="#ffffff" stroke="#0891b2" stroke-width="3"/></g><text class="jp" x="1025" y="404" font-size="40" font-weight="900" fill="#0f172a" text-anchor="middle"><tspan x="1025" dy="0">チームB</tspan></text><path d="M1025 448 L1020 560" fill="none" stroke="#475569" stroke-width="3"  marker-end="url(#arr)"/><g filter="url(#sh)"><rect x="1128" y="336" width="174" height="112" rx="24" fill="#ffffff" stroke="#0891b2" stroke-width="3"/></g><text class="jp" x="1215" y="404" font-size="40" font-weight="900" fill="#0f172a" text-anchor="middle"><tspan x="1215" dy="0">チームC</tspan></text><path d="M1215 448 L1020 560" fill="none" stroke="#475569" stroke-width="3"  marker-end="url(#arr)"/><g filter="url(#sh)"><rect x="742" y="564" width="556" height="160" rx="28" fill="#ffffff" stroke="#059669" stroke-width="3"/></g><text class="jp" x="1020" y="632" font-size="42" font-weight="900" fill="#0f172a" text-anchor="middle"><tspan x="1020" dy="0">🧱 共通プラットフォーム</tspan></text><text class="jp" x="1020" y="684" font-size="38" font-weight="750" fill="#475569" text-anchor="middle"><tspan x="1020" dy="0">技術スタックの乱立を防ぐ</tspan></text><g filter="url(#sh)"><rect x="330.88000000000005" y="773" width="738.2399999999999" height="78" rx="36" fill="#ffffff" stroke="#0891b2" stroke-width="3"/></g><text class="jp" x="700" y="826" font-size="38" font-weight="900" fill="#0891b2" text-anchor="middle">単純化・分割（チームトポロジー）</text><rect x="80" y="896" width="1240" height="198" rx="24" fill="#eef2f7" stroke="#cbd5e1" stroke-width="2"/><text class="jp" x="120" y="946" font-size="38" font-weight="900" fill="#0891b2">💬 補足</text><text class="jp" x="120" y="1002" font-size="38" font-weight="700" fill="#334155" text-anchor="start"><tspan x="120" dy="0">分ければ良いわけではない。誰が責任を持ち・どこまで自律させ</tspan><tspan x="120" dy="50">・どう巻き込むか。曖昧な横軸は無責任になる。</tspan></text>
</svg>
