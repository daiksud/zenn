<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100" viewBox="0 0 1400 1100" role="img" aria-label="指標の罠（stateDiagram）">
  <defs>
    <filter id="sh" x="-25%" y="-25%" width="150%" height="170%"><feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/></filter>
    <marker id="arr" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8.5" markerHeight="8.5" orient="auto-start-reverse"><path d="M0,0 L12,6 L0,12 L3.6,6 Z" fill="#475569"/></marker>
    
  </defs>
  <style>.jp{font-family:"Inter","Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif}</style>
  <rect width="1400" height="1100" fill="#f6f8fc"/><circle cx="1290" cy="110" r="270" fill="#e11d48" opacity="0.08"/><circle cx="120" cy="980" r="300" fill="#f59e0b" opacity="0.08"/><text class="jp" x="80" y="80" font-size="38" font-weight="900" letter-spacing="3" fill="#e11d48">DEV PRODUCTIVITY CON 2025</text>
    <text class="jp" x="78" y="142" font-size="58" font-weight="900" fill="#0f172a">指標の罠（stateDiagram）</text>
    <text class="jp" x="80" y="202" font-size="40" font-weight="800" fill="#475569">グッドハートの法則：測定が目標になると歪む</text><g filter="url(#sh)"><rect x="85.44000000000023" y="253" width="729.1199999999995" height="78" rx="36" fill="#ffffff" stroke="#0f172a" stroke-width="3"/></g><text class="jp" x="450" y="306" font-size="38" font-weight="900" fill="#0f172a" text-anchor="middle">Productivity = Output / Input</text><circle cx="700" cy="356" r="16" fill="#0f172a"/><path d="M700 372 L700 388" fill="none" stroke="#475569" stroke-width="4"  marker-end="url(#arr)"/><path d="M860 556 C975 614 1015 652 1038 698" fill="none" stroke="#475569" stroke-width="4"  marker-end="url(#arr)"/><path d="M806 786 L600 786" fill="none" stroke="#475569" stroke-width="4"  marker-end="url(#arr)"/><path d="M360 694 C300 524 520 470 586 474" fill="none" stroke="#475569" stroke-width="4" stroke-dasharray="2 12" stroke-linecap="round" marker-end="url(#arr)"/><g filter="url(#sh)"><rect x="191.29" y="527" width="229.42000000000002" height="78" rx="36" fill="#ffffff" stroke="#e11d48" stroke-width="3"/></g><text class="jp" x="306" y="580" font-size="38" font-weight="900" fill="#e11d48" text-anchor="middle">悪循環</text><text class="jp" x="1054" y="614" font-size="38" font-weight="800" fill="#9f1239" text-anchor="middle"><tspan x="1054" dy="0">PR分割・障害を</tspan></text><text class="jp" x="1054" y="662" font-size="38" font-weight="800" fill="#9f1239" text-anchor="middle"><tspan x="1054" dy="0">報告しない</tspan></text><g filter="url(#sh)"><rect x="442" y="392" width="516" height="176" rx="30" fill="#ffffff" stroke="#e11d48" stroke-width="3"/></g><text class="jp" x="700" y="462" font-size="42" font-weight="900" fill="#0f172a" text-anchor="middle"><tspan x="700" dy="0">📏 指標を目標化</tspan></text><text class="jp" x="700" y="518" font-size="38" font-weight="750" fill="#475569" text-anchor="middle"><tspan x="700" dy="0">ランキング／プレッシャー</tspan></text><g filter="url(#sh)"><rect x="782" y="698" width="516" height="176" rx="30" fill="#ffffff" stroke="#fb7185" stroke-width="3"/></g><text class="jp" x="1040" y="768" font-size="42" font-weight="900" fill="#0f172a" text-anchor="middle"><tspan x="1040" dy="0">🎭 ズルが起きる</tspan></text><text class="jp" x="1040" y="824" font-size="38" font-weight="750" fill="#475569" text-anchor="middle"><tspan x="1040" dy="0">PRを無意味に分割</tspan></text><g filter="url(#sh)"><rect x="102" y="698" width="516" height="176" rx="30" fill="#ffffff" stroke="#fb7185" stroke-width="3"/></g><text class="jp" x="360" y="768" font-size="42" font-weight="900" fill="#0f172a" text-anchor="middle"><tspan x="360" dy="0">📉 計測が無意味化</tspan></text><text class="jp" x="360" y="824" font-size="38" font-weight="750" fill="#475569" text-anchor="middle"><tspan x="360" dy="0">良い測定でなくなる</tspan></text><rect x="80" y="902" width="1240" height="198" rx="24" fill="#eef2f7" stroke="#cbd5e1" stroke-width="2"/><text class="jp" x="120" y="952" font-size="38" font-weight="900" fill="#e11d48">💬 補足</text><text class="jp" x="120" y="1008" font-size="38" font-weight="700" fill="#334155" text-anchor="start"><tspan x="120" dy="0">文脈のないデータは無意味。行数やPRマージ数で測るのは、</tspan><tspan x="120" dy="50">本のページ数で良し悪しを測るのと同じ。</tspan></text>
</svg>
